name: Deploy to Azure Testing Slot

on:
  push:
    branches:
      - test

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          cd server
          pip install -r requirements.txt

      - name: Build Done
        run: echo "Build successful"

  deploy:
    name: Deploy FastAPI to Testing
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/test'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'shoption-calltracker-api'
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_TESTING }}
          slot-name: testing
          package: ./server

  deploy-webapp:
    name: Deploy Next.js WebApp
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/test'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          cd product_web_page
          npm install

      - name: Build Next.js
        run: |
          cd product_web_page
          npm run build

      - name: Copy Static Files
        run: |
          cp -r product_web_page/public product_web_page/.next/standalone/
          cp -r product_web_page/.next/static product_web_page/.next/standalone/.next/

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'shoption-nextjs-webapp'
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_WEBAPP }}
          package: ./product_web_page/.next/standalone
